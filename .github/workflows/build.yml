name: Build Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-7.0.12-win-${{ runner.arch }}

      - name: Configure (MSVC Release)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Inno Setup)
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" installer\windows\snare_installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SnareRhythmGenerator-Windows
          path: installer/windows/Output/SnareRhythmGenerator-*.exe

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Cache JUCE deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-7.0.12-mac-${{ runner.arch }}

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Package (.pkg)
        run: bash installer/macos/build_pkg.sh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SnareRhythmGenerator-macOS
          path: installer/macos/SnareRhythmGenerator-*.pkg

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SnareRhythmGenerator-Windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SnareRhythmGenerator-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
